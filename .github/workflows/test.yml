name: CI

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache ONNX Models
        uses: actions/cache@v4
        with:
          path: ./.models
          key: ${{ runner.os }}-onnx-models-${{ hashFiles('tests/onnx-clients.test.ts') }}
          restore-keys: |
            ${{ runner.os }}-onnx-models-

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test
