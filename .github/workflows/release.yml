name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Verify tag matches package version
        run: bun run scripts/check-release-version.ts
      - run: bun test
      - run: bunx tsc --noEmit
      - name: Build Linux binaries
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64 src/cli.ts --outfile dist/skill-router-linux-amd64
          bun build --compile --target=bun-linux-arm64 src/cli.ts --outfile dist/skill-router-linux-arm64
          sha256sum dist/skill-router-linux-* > dist/SHA256SUMS
      - uses: actions/attest-build-provenance@v4
        if: github.event.repository.visibility == 'public'
        with:
          subject-path: dist/skill-router-linux-*
      - uses: actions/upload-artifact@v7
        with:
          name: release-binaries
          path: |
            dist/skill-router-linux-amd64
            dist/skill-router-linux-arm64
            dist/SHA256SUMS

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: slim
            suffix: -slim
          - target: full
            suffix: ""
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Verify tag matches package version
        run: bun run scripts/check-release-version.ts
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},suffix=${{ matrix.suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.suffix }}
            type=semver,pattern={{major}},suffix=${{ matrix.suffix }}
            type=raw,value=latest,enable=${{ matrix.target == 'full' }}
            type=raw,value=latest-slim,enable=${{ matrix.target == 'slim' }}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          sbom: true
          provenance: mode=max
      - uses: actions/attest-build-provenance@v4
        if: github.event.repository.visibility == 'public'
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  release:
    needs: [binaries, containers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-binaries
          path: dist
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/skill-router-linux-amd64
            dist/skill-router-linux-arm64
            dist/SHA256SUMS
