name: Release

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      release_tag:
        description: "Clean SemVer tag to publish (for example, v1.2.3)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing clean SemVer tag to publish (for example, v1.2.3)"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Verify tag matches package version
        run: bun run scripts/check-release-version.ts
      - run: bun test
      - run: bunx tsc --noEmit
      - name: Build Linux binaries
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64 src/cli.ts --outfile dist/skillmux-linux-amd64
          bun build --compile --target=bun-linux-arm64 src/cli.ts --outfile dist/skillmux-linux-arm64
      - uses: actions/attest-build-provenance@v4
        if: github.event.repository.visibility == 'public'
        with:
          subject-path: dist/skillmux-linux-*
      - uses: actions/upload-artifact@v7
        with:
          name: release-binaries
          path: |
            dist/skillmux-linux-amd64
            dist/skillmux-linux-arm64

  npm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Verify tag matches package version
        run: bun run scripts/check-release-version.ts
      - run: bun test
      - run: bunx tsc --noEmit
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: slim
            suffix: -slim
          - target: full
            suffix: ""
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Verify tag matches package version
        run: bun run scripts/check-release-version.ts
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/skillmux
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }},suffix=${{ matrix.suffix }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }},suffix=${{ matrix.suffix }}
            type=raw,value=latest,enable=${{ matrix.target == 'full' }}
            type=raw,value=latest-slim,enable=${{ matrix.target == 'slim' }}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          sbom: true
          provenance: mode=max
      - uses: actions/attest-build-provenance@v4
        if: github.event.repository.visibility == 'public'
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  dockerhub-description:
    needs: [containers]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_USERNAME }}/skillmux
          short-description: "Local MCP server: routes natural-language task queries to skills in a SKILL.md vault, with zero-loss delivery."
          readme-filepath: README.md

  release:
    needs: [binaries, npm, containers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-binaries
          path: dist
      - uses: softprops/action-gh-release@v3
        # No generate_release_notes here: release-please already created this
        # release with a changelog-derived body before this tag was pushed —
        # this step only attaches binaries, it must not overwrite the notes.
        with:
          files: |
            dist/skillmux-linux-amd64
            dist/skillmux-linux-arm64
