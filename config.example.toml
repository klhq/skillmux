# skill-router configuration
# Copy to ~/.config/skill-router/config.toml (or point SKILL_ROUTER_CONFIG at it).
# Every value shown is the built-in default; omit anything you don't need to change.

# Root of the skill vault: one directory per skill, each containing SKILL.md
# (agentskills.io format: frontmatter with name, description, optional aliases).
vault_path = "~/.agents/skills"

# The router never writes to the vault. Its SQLite index (including the audit
# log) and embedding vectors live here.
state_dir = "~/.local/state/skill-router"

# Per-request budget for embedding and rerank calls. Exceeding it flips
# resolve_skill into the degraded (lexical-only) lane instead of failing.
remote_timeout_ms = 2000

[recall]
k_lexical = 15   # FTS5/BM25 candidates
k_vector = 15    # embedding-cosine candidates

# Decision thresholds over the reranker's scores. Calibrate against your own
# vault with `skill-router eval` — it prints suggested values for this section.
[thresholds]
match_score = 0.90      # top score required for a confident single match
match_margin = 0.30    # required gap between top and second candidate
candidate_floor = 0.50  # minimum score to appear in an ambiguous shortlist
candidate_limit = 5     # maximum number of candidates returned on ambiguous outcomes (top-k)

# OpenAI-compatible embeddings endpoint (POST {base_url}/v1/embeddings).
# The API key is read from the environment variable named by api_key_env —
# the key value itself never appears in this file.
[embedding]
base_url = "http://127.0.0.1:8080"
api_key_env = "SKILL_ROUTER_EMBED_KEY"
model = "microsoft/harrier-oss-v1-0.6b"
dimension = 1024
device = "cpu"          # device to run local ONNX model on: "cpu", "cuda", "gpu", "wasm", "webgpu" (default: "cpu")
dtype = "q8"            # data type/quantization for local ONNX model: "q8", "fp16", "fp32" (default: "q8")

# Infinity-native reranker endpoint (POST {base_url}/rerank).
[rerank]
base_url = "http://127.0.0.1:7997"
model = "BAAI/bge-reranker-v2-m3"
device = "cpu"          # device to run local ONNX model on: "cpu", "cuda", "gpu", "wasm", "webgpu" (default: "cpu")
dtype = "q8"            # data type/quantization for local ONNX model: "q8", "fp16", "fp32" (default: "q8")

# HTTP server settings (CORS and bearer token authentication).
# Only relevant when serving over HTTP (--transport http).
[server]
auth_enabled = false               # enable bearer token authentication check (default: false)
auth_token_env = "SKILL_ROUTER_AUTH_TOKEN"  # env var name containing the expected API token (default: "SKILL_ROUTER_AUTH_TOKEN")
allowed_origins = ["*"]            # list of whitelisted CORS origins (default: ["*"])
