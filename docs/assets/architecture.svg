<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#21262d" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="blue-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>

    <linearGradient id="green-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <linearGradient id="amber-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Markers for arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#34d399"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#c084fc"/>
    </marker>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="960" height="540" rx="12" fill="url(#bg-grad)"/>

  <!-- Grid Overlay -->
  <path d="M 0 60 H 960 M 0 120 H 960 M 0 180 H 960 M 0 240 H 960 M 0 300 H 960 M 0 360 H 960 M 0 420 H 960 M 0 480 H 960" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>
  <path d="M 120 0 V 540 M 240 0 V 540 M 360 0 V 540 M 480 0 V 540 M 600 0 V 540 M 720 0 V 540 M 840 0 V 540" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Diagram Title Header -->
  <g transform="translate(35, 38)">
    <text font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="700" fill="#f0f6fc">skillmux Architecture &amp; Hybrid Routing Flow</text>
    <text x="520" y="0" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#8b949e">On-demand skill discovery &amp; verified delivery for AI agents</text>
  </g>

  <!-- Container 1: Client / Surface Layer -->
  <g transform="translate(30, 65)" filter="url(#shadow)">
    <rect width="250" height="445" rx="10" fill="url(#card-grad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="0" y="0" width="250" height="36" rx="10" fill="#161b22"/>
    <path d="M 0 26 H 250" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#58a6ff">1. AGENT &amp; CLIENT LAYER</text>

    <!-- Sub-card: Agents -->
    <rect x="15" y="50" width="220" height="85" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="25" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#c9d1d9">Calling AI Agents</text>
    <text x="25" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">• Goose / opencode / custom CLI</text>
    <text x="25" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">• Any stdio or HTTP MCP Client</text>
    <text x="25" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">• Zero standing context overhead</text>

    <!-- Sub-card: MCP Request -->
    <rect x="15" y="150" width="220" height="105" rx="6" fill="#0d1117" stroke="#38bdf8" stroke-dasharray="3,3" stroke-width="1"/>
    <text x="25" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#38bdf8">MCP Request Protocol</text>
    <rect x="23" y="180" width="204" height="24" rx="4" fill="#161b22"/>
    <text x="30" y="196" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#7ee787">resolve_skill("task description")</text>
    <rect x="23" y="210" width="204" height="24" rx="4" fill="#161b22"/>
    <text x="30" y="226" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#7ee787">fetch_skill("skill_id")</text>

    <!-- Sub-card: Pinned Tier -->
    <rect x="15" y="270" width="220" height="150" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="25" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">Optional Pinned Tier</text>
    <text x="25" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Static symlinks for core skills:</text>
    <rect x="23" y="318" width="204" height="38" rx="4" fill="#161b22"/>
    <text x="30" y="334" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#fbbf24">~/.claude/skills/ -&gt; vault</text>
    <text x="30" y="348" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#fbbf24">~/.agents/skills/ -&gt; vault</text>
    <text x="25" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Managed by <tspan font-weight="600" fill="#c9d1d9">skillmux init/sync</tspan></text>
    <text x="25" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Ownership marker: <tspan font-weight="600" fill="#c9d1d9">.skillmux</tspan></text>
    <text x="25" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Core skill cap: max 25</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <path d="M 280 215 H 308" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Container 2: Core Server & Hybrid Retrieval Engine -->
  <g transform="translate(315, 65)" filter="url(#shadow)">
    <rect width="365" height="445" rx="10" fill="url(#card-grad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="0" y="0" width="365" height="36" rx="10" fill="#161b22"/>
    <path d="M 0 26 H 365" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#c084fc">2. SKILLMUX HYBRID ROUTING ENGINE</text>

    <!-- Transports & Security Box -->
    <rect x="15" y="48" width="335" height="48" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="25" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#f0f6fc">Transports &amp; Content Security Scan</text>
    <text x="25" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Stdio / HTTP (Bearer Auth, CORS, Rate Limit) • <tspan fill="#34d399">skillmux scan</tspan></text>

    <!-- Parallel Retrieval Pipelines -->
    <rect x="15" y="106" width="160" height="115" rx="6" fill="#0d1117" stroke="#38bdf8" stroke-width="1"/>
    <text x="23" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#38bdf8">Lexical Lane (BM25)</text>
    <text x="23" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">SQLite FTS5 Index</text>
    <text x="23" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">k_lexical = 20 candidates</text>
    <text x="23" y="174" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Zero network dependency</text>
    <rect x="21" y="184" width="148" height="22" rx="4" fill="#161b22"/>
    <text x="27" y="199" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#7ee787">✓ Always-ready fallback</text>

    <rect x="190" y="106" width="160" height="115" rx="6" fill="#0d1117" stroke="#c084fc" stroke-width="1"/>
    <text x="198" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#c084fc">Vector Lane (Cosine)</text>
    <text x="198" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Local GTE-small (ONNX)</text>
    <text x="198" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">or Remote OpenAI Embeddings</text>
    <text x="198" y="174" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">k_vector = 20 candidates</text>
    <rect x="196" y="184" width="148" height="22" rx="4" fill="#161b22"/>
    <text x="202" y="199" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#c084fc">Semantic similarity</text>

    <!-- Fusion & Rerank Box -->
    <path d="M 95 221 V 235 M 270 221 V 235" stroke="#58a6ff" stroke-width="1.5"/>
    <rect x="15" y="235" width="335" height="75" rx="6" fill="#0d1117" stroke="#fbbf24" stroke-width="1"/>
    <text x="25" y="254" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#fbbf24">Reciprocal-Rank Fusion (RRF) &amp; Reranker</text>
    <text x="25" y="271" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">• Merges &amp; scores shortlist down to top candidates (max 5)</text>
    <text x="25" y="287" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">• Optional Infinity API reranker applies threshold filters</text>

    <!-- Live Index & Vault Watcher -->
    <rect x="15" y="322" width="335" height="105" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="25" y="342" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#f0f6fc">Live Vault Watcher &amp; SHA-256 Verifier</text>
    <text x="25" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Vault: <tspan fill="#c9d1d9">~/skills/*/SKILL.md</tspan> (Read-only)</text>
    <text x="25" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Auto re-indexes changes in seconds without service restart</text>
    <rect x="23" y="386" width="319" height="24" rx="4" fill="#161b22"/>
    <text x="29" y="402" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#34d399">sha256(body) == content_sha256 (Zero-loss guarantee)</text>
  </g>

  <!-- Arrow 2 -> 3 -->
  <path d="M 680 215 H 708" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Container 3: Outcomes & Delivery -->
  <g transform="translate(715, 65)" filter="url(#shadow)">
    <rect width="215" height="445" rx="10" fill="url(#card-grad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="0" y="0" width="215" height="36" rx="10" fill="#161b22"/>
    <path d="M 0 26 H 215" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#34d399">3. DELIVERED OUTCOME</text>

    <!-- Outcome: Matched -->
    <rect x="12" y="48" width="191" height="105" rx="6" fill="#0d1117" stroke="#34d399" stroke-width="1.5"/>
    <rect x="20" y="56" width="68" height="18" rx="3" fill="#064e3b"/>
    <text x="25" y="69" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#34d399">MATCHED</text>
    <text x="20" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#c9d1d9">Clear top skill winner</text>
    <text x="20" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Verbatim SKILL.md body</text>
    <text x="20" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">delivered inline with SHA-256</text>
    <text x="20" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">content hash confirmation</text>

    <!-- Outcome: Ambiguous -->
    <rect x="12" y="163" width="191" height="95" rx="6" fill="#0d1117" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="20" y="171" width="82" height="18" rx="3" fill="#78350f"/>
    <text x="25" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#fbbf24">AMBIGUOUS</text>
    <text x="20" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#c9d1d9">Multiple candidates</text>
    <text x="20" y="219" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Returns top shortlist (id,</text>
    <text x="20" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">title, description). LLM calls</text>
    <text x="20" y="247" font-family="ui-monospace, monospace" font-size="9" fill="#fbbf24">fetch_skill(id)</text>

    <!-- Outcome: No Match -->
    <rect x="12" y="268" width="191" height="75" rx="6" fill="#0d1117" stroke="#8b949e" stroke-width="1"/>
    <rect x="20" y="276" width="75" height="18" rx="3" fill="#21262d"/>
    <text x="25" y="289" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#8b949e">NO_MATCH</text>
    <text x="20" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">No skill loaded. Agent</text>
    <text x="20" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">continues default workflow.</text>

    <!-- Audit Log SQLite -->
    <rect x="12" y="353" width="191" height="74" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="371" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#f0f6fc">Audit &amp; Telemetry</text>
    <text x="20" y="387" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">SQLite audit log in state_dir</text>
    <text x="20" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">Queried by <tspan fill="#38bdf8">skillmux report</tspan></text>
  </g>
</svg>
